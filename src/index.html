<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-width: 300px;
      width: 500px;
      height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f1f1f;
      padding: 16px;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    body.popout {
      width: auto;
      height: 100vh;
    }
    .rules-list { flex: 1; overflow-y: auto; min-height: 0; }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 .logo { width: 20px; height: 20px; }
    .popout-btn {
      margin-left: auto;
      font-size: 14px;
      color: #999;
      text-decoration: none;
      padding: 2px 4px;
      border-radius: 4px;
      cursor: pointer;
    }
    .popout-btn:hover { color: #555; background: #eee; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
    }
    .toggle-row input[type="checkbox"] {
      transform: scale(1.2);
    }
    .toggle-row .label-enabled { color: #2e7d32; }
    .toggle-row .label-disabled { color: #c62828; }

    .section { margin-bottom: 14px; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 3px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 7px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    select { background: #fff; }

    button {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      width: 100%;
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #e8e8e8;
      color: #333;
    }
    .btn-secondary:hover { background: #ddd; }

    .export-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .export-row button { flex: 1; }

    .rules-list {
      margin-bottom: 14px;
    }
    .rules-list .empty-msg {
      text-align: center;
      color: #999;
      padding: 16px 0;
      font-size: 12px;
    }
    .rule-item {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rule-item.enabled {
      border-color: #a5d6a7;
      background: #f0faf0;
    }
    .rule-item.disabled {
      border-color: #ef9a9a;
      background: #fef0f0;
      opacity: 0.7;
    }
    .rule-info {
      flex: 1;
      min-width: 0;
    }
    .rule-info p {
      margin: 1px 0;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rule-info .rule-label {
      font-weight: 600;
      color: #888;
      font-size: 10px;
      text-transform: uppercase;
    }
    .rule-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .rule-actions button {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
    }
    .btn-toggle { background: #e8e8e8; color: #333; }
    .btn-toggle:hover { background: #ddd; }
    .btn-delete { background: #fce4e4; color: #c62828; }
    .btn-delete:hover { background: #f8cece; }

    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #fbe9e7; color: #c62828; }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; color: #ddd; }
      .toggle-row { color: #aaa; }
      .toggle-row .label-enabled { color: #6ecf6e; }
      .toggle-row .label-disabled { color: #ef6e6e; }
      .section-label, label { color: #aaa; }
      input[type="text"], select {
        background: #2a2a2a; color: #ddd; border-color: #555;
      }
      select { background: #2a2a2a; }
      .btn-primary { background: #2563eb; color: #fff; }
      .btn-primary:hover { background: #1d4ed8; }
      .btn-secondary { background: #333; color: #ccc; }
      .btn-secondary:hover { background: #444; }
      .popout-btn { color: #666; }
      .popout-btn:hover { color: #ccc; background: #333; }
      .rule-item { border-color: #444; }
      .rule-item.enabled { border-color: #2e7d32; background: #1a2e1a; }
      .rule-item.disabled { border-color: #7f1d1d; background: #2e1a1a; opacity: 0.7; }
      .rule-info p { color: #bbb; }
      .rule-info .rule-label { color: #888; }
      .btn-toggle { background: #333; color: #ccc; }
      .btn-toggle:hover { background: #444; }
      .btn-delete { background: #3b1515; color: #ef6e6e; }
      .btn-delete:hover { background: #4a1c1c; }
      .rules-list .empty-msg { color: #666; }
      .status.success { background: #1a2e1a; color: #6ecf6e; }
      .status.error { background: #2e1a1a; color: #ef6e6e; }
    }
  </style>
</head>
<body>
  <h2>
    <img class="logo" src="icons/icon-48.png" alt="">
    Resource Redirect
    <a href="#" id="popoutBtn" class="popout-btn" title="Open in a window">&#x2197;</a>
  </h2>

  <div class="toggle-row">
    <input type="checkbox" id="extensionStatus">
    <span id="extensionStatusLabel">Enabled</span>
  </div>

  <div class="section">
    <div class="section-label">Add Rule</div>
    <form id="addRuleForm">
      <label for="remoteUrlFilter">Remote URL</label>
      <input type="text" id="remoteUrlFilter"
             placeholder="e.g., https://example.com/_assets/main.js" required>

      <label for="localUrl">Local URL</label>
      <input type="text" id="localUrl"
             placeholder="e.g., http://localhost:1234/index.js" required>

      <label for="resourceType">Resource Type</label>
      <select id="resourceType" required>
        <option value="script">script</option>
        <option value="stylesheet">stylesheet</option>
        <option value="xmlhttprequest">xmlhttprequest (API/fetch)</option>
        <option value="image">image</option>
        <option value="font">font</option>
        <option value="media">media</option>
        <option value="other">other</option>
      </select>

      <button type="submit" class="btn-primary">Add Rule</button>
    </form>
  </div>

  <div class="section-label">Rules</div>
  <div class="rules-list" id="rulesList"></div>

  <div class="export-row">
    <button class="btn-secondary" id="exportRules">Export JSON</button>
    <button class="btn-secondary" id="importRules">Import JSON</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display: none;">

  <div class="status" id="status"></div>

  <script src="scripts.js"></script>
</body>
</html>
